version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kygoo-studio
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
      # Optional: Persistent storage from Coolify
      # - coolify-persistent-storage:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - coolify
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: kygoo-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=kygoo_frame_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coolify
    profiles:
      - with-db

volumes:
  uploads:
    driver: local
  postgres_data:
    driver: local

networks:
  coolify:
    driver: bridge
